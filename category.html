<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Category — Cooking at Livingstone</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
</head>
<body>

<nav class="nav" id="main-nav">
  <a href="index.html" class="nav-brand">Cooking at <em>Livingstone</em></a>
  <button class="nav-toggle" id="nav-toggle" aria-label="Menu">☰</button>
  <ul class="nav-links" id="nav-links">
    <li><a href="index.html" class="nav-link">Home</a></li>
    <li><a href="browse.html" class="nav-link">Recipes</a></li>
    <li><a href="authors.html" class="nav-link">Authors</a></li>
    <li><a href="categories.html" class="nav-link is-active">Categories</a></li>
    <li><a href="ingredient-index.html" class="nav-link">Ingredient Index</a></li>
  </ul>
</nav>

<main>
  <!-- Hero injected by JS -->
  <div id="page-hero"></div>

  <div class="browse-layout">

    <!-- ════════ SIDEBAR ════════ -->
    <aside class="sidebar" id="sidebar">
      <div class="mob-sheet-head">
        <span class="mob-sheet-label">Filters</span>
      </div>
      <div id="sidebar-inner">

        <!-- 1 · Favourites -->
        <div class="fav-section">
          <div class="sidebar-title">Quick View</div>
          <button class="fav-toggle" id="fav-toggle">
            <span class="fav-toggle-left">
              <span style="font-size:15px;line-height:1;">❤️</span>
              <span>My Favourites</span>
            </span>
            <span class="fav-count" id="fav-count">0</span>
          </button>
        </div>

        <!-- 2 · Author filter (filters within this category) -->
        <div class="sidebar-title">Filter by Author</div>
        <div id="author-filters"
             style="margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border);">
        </div>

        <!-- 3 · Ingredients A–Z (filters within this category) -->
        <div class="sidebar-title">Ingredients A–Z</div>
        <div class="ing-search-wrap">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input type="text" id="ing-search" placeholder="Search ingredients…">
        </div>
        <div id="ing-list"></div>

      </div>
    </aside>

    <!-- ════════ MAIN CONTENT ════════ -->
    <div class="browser-main" id="page-main">
      <div class="empty"><div class="empty-icon">⏳</div><p>Loading…</p></div>
    </div>

  </div>

  <div class="mob-backdrop" id="mob-backdrop"></div>
  <button class="mob-trigger" id="mob-trigger">
    <span>Filters <span class="mob-summary" id="mob-summary">All recipes</span></span>
    <span>☰</span>
  </button>
</main>

<footer>
  <div class="footer-inner">
    <div>
      <div class="footer-eyebrow">Kitchen Notes</div>
      <div class="footer-title">Cook well, share often, <em>eat together</em></div>
    </div>
    <div class="footer-note"><a href="submit.html" class="footer-submit-btn">Add a recipe →</a></div>
  </div>
</footer>

<script src="data.js"></script>
<script>

const favIds  = loadFavs();
window.lvFavIds = favIds; // auth.js uses this to sync UI after sign-in
const params  = new URLSearchParams(location.search);
const catName = params.get('name') || '';

let activeAuthor = null;
let activeIng    = null;
let showFavs     = false;
// Base recipe set for this category page
const baseRecs = RECIPES.filter(r => r.category === catName);

// ── GUARD ─────────────────────────────────────────────
if (!catName || !baseRecs.length) {
  document.title = 'Category not found — Cooking at Livingstone';
  document.getElementById('page-main').innerHTML =
    '<div class="empty"><div class="empty-icon">🔍</div>' +
    '<p>Category not found. <a href="categories.html" style="color:var(--rust)">← All Categories</a></p></div>';
} else {

  const m = CAT_META[catName] || { icon:'🍽️', bg:'rgba(192,90,44,0.08)' };
  document.title = catName + ' — Cooking at Livingstone';

  // Build hero — if an image exists use it as a background with a dark overlay
  const heroStyle = m.img
    ? `style="background-image:url('${m.img}');background-size:cover;background-position:center;position:relative;"`
    : '';
  const heroOverlay = m.img
    ? `<div style="position:absolute;inset:0;background:linear-gradient(135deg,rgba(26,20,16,0.78) 0%,rgba(26,20,16,0.55) 100%);pointer-events:none;"></div>`
    : '';

  document.getElementById('page-hero').innerHTML = `
    <section class="subpage-hero" ${heroStyle}>
      ${heroOverlay}
      <a href="categories.html" class="back-btn" style="position:relative;z-index:1;">← All Categories</a>
      <h1 style="position:relative;z-index:1;">${m.img ? '' : m.icon+' '}<em>${escHtml(catName)}</em></h1>
      <div class="subpage-meta" style="position:relative;z-index:1;">
        <span>${baseRecs.length} recipes</span>
      </div>
      <div class="hero-rule"></div>
    </section>`;

  // ── FILTER LOGIC ──────────────────────────────────
  function getFiltered() {
    return baseRecs.filter(r => {
      if (showFavs      && !favIds.has(r.id))                                           return false;
      if (activeAuthor  && r.author !== activeAuthor)                                   return false;
      if (activeIng     && !r.ingredients.some(i => normalizeIng(i) === activeIng))    return false;
      return true;
    });
  }

  // ── FAVOURITES ────────────────────────────────────
  function renderFavToggle() {
    document.getElementById('fav-toggle').classList.toggle('is-active', showFavs);
    document.getElementById('fav-count').textContent = favIds.size;
  }

  document.getElementById('fav-toggle').addEventListener('click', () => {
    showFavs = !showFavs;
    renderFavToggle();
    renderAuthors();
    renderIngList();
    renderMain();
    if (window.innerWidth <= 768) { mobSheetOpen = false; syncMob(); }
  });

  // ── AUTHOR BUTTONS (filter within this category) ──
  function renderAuthors() {
    const el       = document.getElementById('author-filters');
    const filtered = getFiltered();
    // Only show authors present in the current filtered set (plus always show the active one)
    const allAuthors = [...new Set(baseRecs.map(r => r.author))].sort();

    el.innerHTML = allAuthors.map(a => {
      const countInFiltered = baseRecs.filter(r => {
        if (showFavs && !favIds.has(r.id)) return false;
        if (activeIng && !r.ingredients.some(i => normalizeIng(i) === activeIng)) return false;
        return r.author === a;
      }).length;
      return `
        <button class="author-filter ${activeAuthor===a?'is-active':''}" data-a="${escHtml(a)}"
                ${countInFiltered===0 && activeAuthor!==a ? 'style="opacity:.4;"' : ''}>
          <div>
            <span class="author-filter-name">${escHtml(a)}</span>
            <span class="author-filter-book">${escHtml(RECIPES.find(r=>r.author===a)?.book||'')}</span>
          </div>
          <span class="badge">${countInFiltered}</span>
        </button>`;
    }).join('');

    el.querySelectorAll('[data-a]').forEach(btn => btn.addEventListener('click', () => {
      activeAuthor = activeAuthor === btn.dataset.a ? null : btn.dataset.a;
      renderAuthors();
      renderIngList();
      renderMain();
      if (window.innerWidth <= 768) { mobSheetOpen = false; syncMob(); }
    }));
  }

  // ── INGREDIENT LIST ───────────────────────────────
  function renderIngList(filter = '') {
    const el       = document.getElementById('ing-list');
    const filtered = getFiltered();

    const relevant = new Set();
    filtered.forEach(r => r.ingredients.forEach(i => {
      const n = normalizeIng(i); if (n) relevant.add(n);
    }));

    const ings   = ALL_INGREDIENTS.filter(i => relevant.has(i) && i.includes(filter.toLowerCase()));
    const groups = groupByLetter(ings);

    el.innerHTML = Object.keys(groups).sort().map(letter => `
      <div class="ing-group">
        <div class="ing-letter">${letter}</div>
        ${groups[letter].map(ing => `
          <button class="ing-btn ${activeIng===ing?'is-active':''}" data-ing="${ing}">
            <span>${escHtml(INDEX[ing].display)}</span>
            <span class="badge">${filtered.filter(r=>r.ingredients.some(i=>normalizeIng(i)===ing)).length}</span>
          </button>`).join('')}
      </div>`).join('');

    el.querySelectorAll('[data-ing]').forEach(btn => btn.addEventListener('click', () => {
      activeIng = activeIng === btn.dataset.ing ? null : btn.dataset.ing;
      renderIngList(document.getElementById('ing-search').value);
      renderAuthors();
      renderMain();
      if (window.innerWidth <= 768) { mobSheetOpen = false; syncMob(); }
    }));
  }

  // ── MAIN CONTENT ──────────────────────────────────
  function renderMain() {
    const main     = document.getElementById('page-main');
    const filtered = getFiltered();
    const hasFilter = showFavs || activeAuthor || activeIng;

    const pills = [];
    if (showFavs)     pills.push(`<span class="filter-pill">❤️ Favourites <button class="pill-remove" data-remove="favs">×</button></span>`);
    if (activeAuthor) pills.push(`<span class="filter-pill">${escHtml(activeAuthor)} <button class="pill-remove" data-remove="author">×</button></span>`);
    if (activeIng)    pills.push(`<span class="filter-pill">${escHtml(INDEX[activeIng]?.display||activeIng)} <button class="pill-remove" data-remove="ing">×</button></span>`);

    main.innerHTML = `
      <div class="browser-toolbar">
        <div style="flex:1;min-width:0;">
          <div class="browser-heading">
            ${hasFilter ? 'Filtered <em>Recipes</em>' : `<em>${escHtml(catName)}</em>`}
          </div>
          <div class="browser-count">${hasFilter ? filtered.length + ' recipe' + (filtered.length!==1?'s':'') : filtered.length + ' recipes'}</div>
          <div class="active-filters" id="active-filters">${pills.join('')}</div>
        </div>
        ${hasFilter ? '<button class="clear-btn" id="clear-btn">Clear</button>' : ''}
      </div>

      ${filtered.length
        ? `<div class="recipe-grid" id="cat-grid">
             ${filtered.map(r => recipeCardHtml(r, favIds)).join('')}
           </div>`
        : '<div class="empty"><div class="empty-icon">🔍</div><p>No recipes match this filter.</p></div>'
      }
    `;

    attachFavListeners(main, favIds);

    // Pill remove handlers
    main.querySelectorAll('[data-remove]').forEach(btn => btn.addEventListener('click', () => {
      if (btn.dataset.remove === 'favs')   { showFavs = false; renderFavToggle(); }
      if (btn.dataset.remove === 'author') activeAuthor = null;
      if (btn.dataset.remove === 'ing')    activeIng    = null;
      renderAuthors(); renderIngList(); renderMain();
    }));

    const clearBtn = document.getElementById('clear-btn');
    if (clearBtn) clearBtn.addEventListener('click', () => {
      activeAuthor = null; activeIng = null; showFavs = false;
      renderFavToggle(); renderAuthors(); renderIngList(); renderMain();
    });

    // Mobile summary
    const parts = [];
    if (showFavs)     parts.push('Favourites');
    if (activeAuthor) parts.push(activeAuthor.split(' ').pop());
    if (activeIng)    parts.push(INDEX[activeIng]?.display || '');
    document.getElementById('mob-summary').textContent = parts.length ? parts.join(' · ') : catName;
  }

  // ── SEARCH ────────────────────────────────────────
  document.getElementById('ing-search').addEventListener('input', e => renderIngList(e.target.value));

  // ── MOBILE SHEET ──────────────────────────────────
  let mobSheetOpen = false;
  function syncMob() {
    document.getElementById('sidebar').classList.toggle('is-open', mobSheetOpen);
    document.getElementById('mob-backdrop').classList.toggle('is-show', mobSheetOpen);
  }
  document.getElementById('mob-trigger').addEventListener('click',  () => { mobSheetOpen = !mobSheetOpen; syncMob(); });
  document.getElementById('mob-backdrop').addEventListener('click', () => { mobSheetOpen = false; syncMob(); });

  // ── INIT ──────────────────────────────────────────
  renderFavToggle();
  renderAuthors();
  renderIngList();
  renderMain();
}
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.js"></script>
<script src="auth.js"></script>
<script>
document.getElementById('nav-toggle').addEventListener('click', function() {
  document.getElementById('nav-links').classList.toggle('is-open');
});
</script>
</body>
</html>
